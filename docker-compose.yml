services:
  app:
    build: .
    container_name: ai-agents-container

    # Read-only filesystem (volumes remain writable if needed)
    read_only: true

    tmpfs:
      - /tmp

    stdin_open: true   # <- allow interactive input (docker -i)
    tty: true          # <- allocate a TTY (docker -t)

    working_dir: /app/project
    network_mode: "host"

    environment:
      - CONTAINER_CMD

    volumes:
      - ${HOST_FOLDER:-/tmp}:/app/project:Z
      - ./.llxprt-config:/home/node/.llxprt:Z
      - ./.claude-config:/home/node/.claude:Z
      - ./.claude-config/.claude.json:/home/node/.claude.json:Z
